<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Tailwind + daisyUI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font-awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <title>Green Earth</title>
  </head>
  <body>
    <header class="bg-[#15803D]">
      <div class="max-w-[1920px] mx-auto">
        <div class="navbar bg-[#15803D] shadow-sm md:max-w-[95%] mx-auto">
          <div class="navbar-start">
            <div class="dropdown">
              <div
                tabindex="0"
                role="button"
                class="btn bg-[#15803D] border-0 shadow-2xl text-white lg:hidden"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-5 w-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M4 6h16M4 12h8m-8 6h16"
                  />
                </svg>
              </div>
              <ul
                tabindex="-1"
                class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
              >
                <li><a>About</a></li>
                <li><a>Gallery</a></li>
              </ul>
            </div>
            <a class="font-bold text-xl text-white cursor-pointer"
              >Green Earth</a
            >
          </div>
          <div class="navbar-center hidden lg:flex">
            <ul class="menu menu-horizontal px-1">
              <li class="text-white"><a>About</a></li>
              <li class="text-white"><a>Gallery</a></li>
            </ul>
          </div>
          <div class="navbar-end">
            <a class="btn bg-[#FACC15] text-[#15803D] rounded-3xl"
              >Plant a Tree</a
            >
          </div>
        </div>
      </div>
    </header>
    <main>
      <!-- Banner section -->
      <section class="max-w-[1920px] mx-auto bg-[#CFF0DC]">
        <div
          class="flex justify-between items-center mx-5 pt-15 md:pt-0 pb-15 md:pb-0"
        >
          <div class="hidden md:block mt-20">
            <img src="assets/hero-leaf1.png" alt="" />
          </div>

          <div class="text-center">
            <h2 class="text-[#1F2937] text-2xl lg:text-4xl font-bold">
              Plant a Tree, Grow a Future
            </h2>
            <p class="text-[#1F2937] mt-5 mb-6">
              Join our mission to plant 1 million trees and make the Earth
              greener for future generations.
            </p>
            <button class="btn bg-[#FACC15] text-[#15803D] rounded-3xl">
              Get Involved
            </button>
          </div>

          <div class="hidden md:block mt-20">
            <img src="assets/hero-leaf2.png" alt="" />
          </div>
        </div>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
